# winget installer manifest.
#
# Submit these three files to microsoft/winget-pkgs under
#   manifests/s/SteveWeed79/palctl/<version>/
# For each new release: bump PackageVersion in all three files, point
# InstallerUrl at the new tag, copy InstallerSha256 from the release's
# SHA256SUMS.txt, run `winget validate` and `winget install --manifest`,
# then open the PR. After it merges: `winget install SteveWeed79.palctl`.
PackageIdentifier: SteveWeed79.palctl
PackageVersion: 1.0.0
InstallerType: inno
InstallModes:
  - interactive
  - silent
  - silentWithProgress
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/SteveWeed79/palctl/releases/download/1.0.0/palctl-setup.exe
    InstallerSha256: 44B9A575E53B6BC589344103CFA64A252A974120482FD05E8C1D7C9DBEB7DA80
ManifestType: installer
ManifestVersion: 1.6.0
