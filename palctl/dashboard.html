<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>palctl</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232a78d6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2.5 L19.5 5.5 V11.5 C19.5 16.3 16.2 20.1 12 21.5 C7.8 20.1 4.5 16.3 4.5 11.5 V5.5 Z'/%3E%3Cpath d='M6.5 12 H9 L10.5 8.5 L13 15.5 L14.5 12 H17.5'/%3E%3C/svg%3E">
<style>
  /* Served by the palctl daemon on 127.0.0.1 only. The page itself is public
     (it contains no data); every /state call and every action needs the
     per-user token, which rides in the URL fragment (#…) — fragments never
     leave the browser. Actions send it in a custom header, which browsers
     only allow same-origin — that requirement is also the CSRF defence. */
  :root {
    color-scheme: light;
    --plane: #f9f9f7;          /* page behind the cards */
    --surface: #fcfcfb;        /* cards / chart surface */
    --panel: #f3f3f1;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --ink-3: #8a8983;
    --line: #e3e2de;
    --series: #2a78d6;         /* memory sparkline */
    --series-fill: rgba(42, 120, 214, 0.10);
    --meter-track: #cde2fb;    /* lighter step of the series ramp */
    --good: #0ca30c;
    --warning: #fab219;
    --critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --plane: #0d0d0d;
      --surface: #1a1a19;
      --panel: #232322;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --ink-3: #86857d;
      --line: #33332f;
      --series: #3987e5;
      --series-fill: rgba(57, 135, 229, 0.14);
      --meter-track: #184f95;  /* darker step of the same ramp */
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--plane); color: var(--ink);
    font: 14px/1.45 system-ui, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 20px 16px 48px; }
  header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .mark { width: 26px; height: 26px; color: var(--series); flex: none; }
  h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; }
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--ink-2);
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 12px 4px 9px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-3); flex: none; }
  .dot.up   { background: var(--good); }
  .dot.down { background: var(--critical); }
  .op { font-size: 12px; color: var(--ink-2); }
  .op::before { content: "· "; color: var(--ink-3); }
  .op:empty { display: none; }
  #err {
    margin: 16px 0 0; padding: 10px 12px; border-radius: 10px;
    background: var(--surface); color: var(--ink-2); font-size: 13px;
    border: 1px solid var(--line);
  }
  #err:empty { display: none; }
  .tiles {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
    gap: 10px; margin-top: 18px;
  }
  .tile {
    background: var(--surface); border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--line);
  }
  .tile .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
             color: var(--ink-3); }
  .tile .v { font-size: 22px; font-weight: 600; margin-top: 2px; }
  .tile .s { font-size: 11px; color: var(--ink-2); margin-top: 1px; }
  .meter {
    margin-top: 8px; height: 4px; border-radius: 2px;
    background: var(--meter-track); overflow: hidden;
  }
  .meter i {
    display: block; height: 100%; border-radius: 2px;
    background: var(--series); width: 0; transition: width 0.6s ease;
  }
  .meter i.warn { background: var(--warning); }
  .meter i.crit { background: var(--critical); }
  section {
    margin-top: 18px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
  }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
       color: var(--ink-3); margin: 0 0 10px; font-weight: 600; }
  .scroll-x { overflow-x: auto; }
  .chart-box { position: relative; }
  svg { display: block; width: 100%; height: 120px; }
  .spark-line { fill: none; stroke: var(--series); stroke-width: 2;
                stroke-linejoin: round; stroke-linecap: round; }
  .spark-fill { fill: var(--series-fill); }
  .limit-line { stroke: var(--critical); stroke-width: 1; stroke-dasharray: 4 4;
                opacity: 0.7; }
  .limit-tag  { font-size: 10px; fill: var(--ink-3); }
  .axis-tag   { font-size: 10px; fill: var(--ink-3); }
  .cursor { stroke: var(--ink-3); stroke-width: 1; opacity: 0; }
  #tip {
    position: absolute; pointer-events: none; opacity: 0; z-index: 2;
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 4px 8px; font-size: 12px; color: var(--ink);
    font-variant-numeric: tabular-nums; white-space: nowrap;
    transform: translate(-50%, -130%);
  }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th { text-align: left; font-size: 11px; text-transform: uppercase;
       letter-spacing: 0.6px; color: var(--ink-3); font-weight: 600;
       padding: 4px 8px 4px 0; border-bottom: 1px solid var(--line); }
  td { padding: 5px 8px 5px 0; border-bottom: 1px solid var(--line);
       color: var(--ink-2); }
  td:first-child { color: var(--ink); }
  th.num, td.num { text-align: right; }
  .events { list-style: none; margin: 0; padding: 0; font-size: 13px; }
  .events li { padding: 4px 0; border-bottom: 1px solid var(--line);
               display: flex; gap: 10px; }
  .events time { color: var(--ink-3); font-variant-numeric: tabular-nums;
                 flex: none; }
  .events span { color: var(--ink-2); overflow-wrap: anywhere; }
  .muted { color: var(--ink-3); font-size: 13px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    display: inline-flex; align-items: center; gap: 7px;
    font: inherit; font-size: 13px; font-weight: 500; color: var(--ink);
    background: var(--panel); border: 1px solid var(--line); border-radius: 9px;
    padding: 7px 13px; cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  button svg { width: 15px; height: 15px; flex: none; color: var(--ink-2); }
  button:hover:not(:disabled) { border-color: var(--ink-3); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:focus-visible { outline: 2px solid var(--series); outline-offset: 1px; }
  button:disabled { opacity: 0.45; cursor: default; }
  button.danger { color: var(--critical); }
  button.danger svg { color: var(--critical); }
  button.small { font-size: 12px; padding: 4px 10px; gap: 5px; }
  .announce { display: flex; gap: 8px; margin-top: 10px; }
  .announce input {
    flex: 1; font: inherit; font-size: 13px; color: var(--ink);
    background: var(--panel); border: 1px solid var(--line); border-radius: 9px;
    padding: 7px 11px; min-width: 0;
  }
  .announce input::placeholder { color: var(--ink-3); }
  .announce input:focus { outline: none; border-color: var(--series); }
  #act-note { margin: 8px 0 0; min-height: 1.2em; }
  td.act { text-align: right; white-space: nowrap; }
  .axis-row {
    display: flex; justify-content: space-between; margin-top: 4px;
    font-size: 10px; color: var(--ink-3); font-variant-numeric: tabular-nums;
  }
  /* Phone: the kick/ban buttons matter more than the buildings count. */
  @media (max-width: 480px) {
    .hide-sm { display: none; }
    .wrap { padding: 14px 10px 40px; }
    section { padding: 12px; }
  }
  /* Confirm dialog — native <dialog> supplies focus trap / Esc / top layer. */
  dialog {
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--line); border-radius: 14px;
    padding: 18px 20px; max-width: min(420px, calc(100vw - 32px));
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
  }
  dialog::backdrop { background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(2px); }
  dialog h3 { margin: 0 0 8px; font-size: 15px; }
  dialog p { margin: 0; font-size: 13px; color: var(--ink-2); white-space: pre-line; }
  .c-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  #c-ok.danger { border-color: var(--critical); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <!-- The GUI's app icon (palctl/gui/icons/app-icon.svg), inlined so the web
         and desktop faces of the app share one mark. currentColor = series blue. -->
    <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 2.5 L19.5 5.5 V11.5 C19.5 16.3 16.2 20.1 12 21.5 C7.8 20.1 4.5 16.3 4.5 11.5 V5.5 Z"/>
      <path d="M6.5 12 H9 L10.5 8.5 L13 15.5 L14.5 12 H17.5"/>
    </svg>
    <h1>palctl</h1>
    <span class="badge"><span id="dot" class="dot"></span><span id="svc">connecting…</span>
      <span class="op" id="op"></span></span>
  </header>
  <p id="err"></p>

  <section id="actions-sec" hidden>
    <h2>Actions</h2>
    <!-- Icons are the GUI action set (palctl/gui/icons/action-*.svg), inlined. -->
    <div class="actions">
      <button id="a-startstop"><svg id="ss-icon" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true"><path id="ss-path" fill="currentColor"
        d="M8 5.5 L18 12 L8 18.5 Z"/></svg><span id="ss-label">Start</span></button>
      <button id="a-restart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 8 A9 9 0 1 0 21 12"/><polyline points="20 3 20 8 15 8"/></svg>Restart</button>
      <button id="a-save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save world</button>
      <button id="a-backup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/>
        <line x1="10" y1="13" x2="14" y2="13"/></svg>Backup</button>
      <button id="a-update"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Update server</button>
    </div>
    <div class="announce">
      <input id="a-msg" placeholder="Announce to everyone in-game…" maxlength="200"
             aria-label="Announcement message">
      <button id="a-announce">Announce</button>
    </div>
    <p class="muted" id="act-note"></p>
  </section>

  <div class="tiles" id="tiles" hidden>
    <div class="tile"><div class="k">Players</div><div class="v" id="t-players">–</div></div>
    <div class="tile"><div class="k">Server FPS</div><div class="v" id="t-fps">–</div>
      <div class="s" id="t-frame"></div></div>
    <div class="tile"><div class="k">Memory</div><div class="v" id="t-mem">–</div>
      <div class="s" id="t-memlim"></div>
      <div class="meter" id="t-meter" hidden><i id="t-meter-fill"></i></div></div>
    <div class="tile"><div class="k">CPU</div><div class="v" id="t-cpu">–</div></div>
    <div class="tile"><div class="k">Uptime</div><div class="v" id="t-up">–</div></div>
    <div class="tile"><div class="k">In-game</div><div class="v" id="t-day">–</div>
      <div class="s" id="t-camps"></div></div>
  </div>

  <section id="chart-sec" hidden>
    <h2>Memory — last 2 hours</h2>
    <div class="chart-box">
      <svg id="spark" role="img" aria-label="Server memory over the last two hours"
           viewBox="0 0 880 120" preserveAspectRatio="none"></svg>
      <div id="tip"></div>
    </div>
    <div class="axis-row"><span id="ax-start"></span><span id="ax-end"></span></div>
  </section>

  <section id="players-sec" hidden>
    <h2>Players online</h2>
    <div class="scroll-x">
    <table aria-label="Players online">
      <thead><tr><th>Name</th><th class="num">Level</th><th class="num">Ping</th>
        <th class="num hide-sm">Buildings</th><th></th></tr></thead>
      <tbody id="players"></tbody>
    </table>
    </div>
    <p class="muted" id="players-empty" hidden>Nobody online.</p>
  </section>

  <section id="backups-sec" hidden>
    <h2>Backups</h2>
    <button id="b-refresh" class="small">Show backups</button>
    <div class="scroll-x">
    <table id="b-table" aria-label="Backups" hidden style="margin-top:8px">
      <thead><tr><th>Name</th><th class="num">Size</th><th></th></tr></thead>
      <tbody id="b-rows"></tbody>
    </table>
    </div>
    <p class="muted" id="b-empty" hidden>No backups yet.</p>
  </section>

  <section id="events-sec" hidden>
    <h2>Recent events</h2>
    <ul class="events" id="events"></ul>
  </section>
</div>

<dialog id="confirm" aria-labelledby="c-title">
  <h3 id="c-title"></h3>
  <p id="c-body"></p>
  <!-- Cancel first in DOM: showModal() focuses it, so Enter can't destroy. -->
  <div class="c-row">
    <button id="c-cancel" type="button">Cancel</button>
    <button id="c-ok" type="button"></button>
  </div>
</dialog>

<script>
"use strict";
const $ = (id) => document.getElementById(id);

// The token arrives in the fragment (palctl ui puts it there). Remember it so
// a plain reload of the same tab keeps working even if the hash gets edited.
const token = location.hash.slice(1) || sessionStorage.getItem("palctl-token") || "";
if (location.hash.slice(1)) {
  sessionStorage.setItem("palctl-token", token);
  // Strip the token out of the address bar and browser history right away, so it
  // isn't left sitting in the URL. sessionStorage (per-tab, cleared when the tab
  // closes) keeps a plain reload working.
  history.replaceState(null, "", location.pathname + location.search);
}

const esc = (s) => String(s).replace(/[&<>"']/g,
  (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtUp = (s) => {
  const m = Math.floor(s / 60), h = Math.floor(m / 60), d = Math.floor(h / 24);
  return d ? `${d}d ${h % 24}h` : `${h}h ${String(m % 60).padStart(2, "0")}m`;
};

let histData = [];

async function tick() {
  if (!token) {
    $("err").textContent = "No token in the URL. Open the dashboard with " +
      "`palctl ui` so the link carries it.";
    return;
  }
  let state;
  try {
    const r = await fetch("/state", { headers: { "X-Palctl-Token": token } });
    if (r.status === 401) { $("err").textContent =
      "The daemon rejected the token — reopen with `palctl ui`."; return; }
    state = await r.json();
  } catch {
    $("err").textContent = "Lost the daemon. Retrying…";
    $("svc").textContent = "daemon unreachable";
    $("dot").className = "dot down";
    return;
  }
  $("err").textContent = "";
  render(state);
}

// ---------- actions ----------
// Every action call carries the token in a custom header. Browsers only allow
// custom headers same-origin (or after a CORS preflight the daemon never
// grants), so a malicious page in another tab can't drive these endpoints —
// the header requirement doubles as CSRF protection.

const note = (msg) => { $("act-note").textContent = msg; };

// In-page confirm on the native <dialog>: focus trap, Esc, and backdrop come
// free. Cancel is first in the DOM so it takes initial focus — Enter can
// never confirm a destructive action by accident. Resolves false on Esc/close.
function ask({ title, body, ok, danger = true }) {
  return new Promise((resolve) => {
    $("c-title").textContent = title;
    $("c-body").textContent = body;
    const okBtn = $("c-ok"), dlg = $("confirm");
    okBtn.textContent = ok;
    okBtn.classList.toggle("danger", danger);
    okBtn.onclick = () => { dlg.close(); resolve(true); };
    $("c-cancel").onclick = () => dlg.close();
    dlg.onclose = () => resolve(false);  // no-op if OK already resolved true
    dlg.showModal();
  });
}

async function act(what, body, confirmOpts) {
  if (confirmOpts && !(await ask(confirmOpts))) return;
  note("");
  try {
    const r = await fetch(`/action/${what}`, {
      method: "POST",
      headers: { "X-Palctl-Token": token, "Content-Type": "application/json" },
      body: JSON.stringify(body || {}),
    });
    const d = await r.json().catch(() => ({}));
    if (r.status === 401) note("The daemon rejected the token — reopen with `palctl ui`.");
    else if (r.status === 409) note(d.error || "Busy — another operation is in progress.");
    else if (!r.ok) note(d.error ? `Failed: ${d.error}` : `Failed (HTTP ${r.status}).`);
    else note("✓ Sent.");
  } catch {
    note("Lost the daemon — is it running?");
  }
  setTimeout(tick, 600);  // reflect the new state promptly
}

let running = false;  // service RUNNING, per the last /state

$("a-startstop").addEventListener("click", () => {
  if (running) {
    act("stop", {}, {
      title: "Stop the server?",
      body: "The world is saved first. Neither the watchdog nor the schedule " +
        "will restart it until you start it again.",
      ok: "Stop server",
    });
  } else {
    act("start");
  }
});
$("a-restart").addEventListener("click", () =>
  act("restart", { reason: "Admin restart (web)" }, {
    title: "Restart the server?",
    body: "Players get the in-game countdown before it goes down.",
    ok: "Restart", danger: false,
  }));
$("a-save").addEventListener("click", () => act("save"));
$("a-backup").addEventListener("click", () => act("backup"));
$("a-update").addEventListener("click", () =>
  act("update-server", {}, {
    title: "Update the server?",
    body: "SteamCMD run: backup, stop, update, restart. Players get " +
      "disconnected while it runs.",
    ok: "Update", danger: false,
  }));
$("a-announce").addEventListener("click", () => {
  const msg = $("a-msg").value.trim();
  if (!msg) return;
  act("announce", { message: msg });
  $("a-msg").value = "";
});
$("a-msg").addEventListener("keydown", (ev) => {
  if (ev.key === "Enter") $("a-announce").click();
});

// ---------- backups ----------

async function loadBackups() {
  let list;
  try {
    const r = await fetch("/backups", { headers: { "X-Palctl-Token": token } });
    if (!r.ok) { note(`Couldn't list backups (HTTP ${r.status}).`); return; }
    list = await r.json();
  } catch {
    note("Lost the daemon — is it running?");
    return;
  }
  $("b-refresh").textContent = "Refresh";
  $("b-table").hidden = list.length === 0;
  $("b-empty").hidden = list.length > 0;
  $("b-rows").innerHTML = list.map((b) =>
    `<tr><td>${esc(b.name)}</td>` +
    `<td class="num">${Math.round(b.size_mb).toLocaleString()} MB</td>` +
    `<td class="act"><button class="small danger" data-restore="${esc(b.name)}">` +
    `Restore</button></td></tr>`).join("");
}

$("b-refresh").addEventListener("click", loadBackups);
$("players").addEventListener("click", (ev) => {
  const t = ev.target;
  if (!t.getAttribute) return;
  const name = t.getAttribute("data-name") || "";
  const kick = t.getAttribute("data-kick"), ban = t.getAttribute("data-ban");
  if (kick) act("kick", { user_id: kick, reason: "Kicked by admin" }, {
    title: `Kick ${name}?`,
    body: "They can rejoin right away.",
    ok: "Kick", danger: false,
  });
  else if (ban) act("ban", { user_id: ban, reason: "Banned by admin" }, {
    title: `Ban ${name}?`,
    body: "They cannot rejoin until unbanned.",
    ok: "Ban",
  });
});
$("b-rows").addEventListener("click", (ev) => {
  const name = ev.target.getAttribute && ev.target.getAttribute("data-restore");
  if (!name) return;
  act("restore", { name }, {
    title: "Restore over the current world?",
    body: `Backup: ${name}\n\nThe server is stopped first and the current ` +
      "world is snapshotted to a pre-restore backup, so this is undoable — " +
      "but everything since this backup will be gone from the live world.",
    ok: "Restore",
  });
});

// ---------- render ----------

function render(state) {
  const alive = state.alive === true;
  $("dot").className = "dot " + (alive ? "up" : "down");
  $("svc").textContent = (state.service || "UNKNOWN") +
    (alive ? " · REST API answering" : " · REST API not answering");
  $("op").textContent = state.operation ? `${state.operation} in progress…` : "";

  running = state.service === "RUNNING";
  $("actions-sec").hidden = false;
  $("backups-sec").hidden = false;
  const busy = !!state.operation;
  $("ss-label").textContent = running ? "Stop" : "Start";
  // Swap the glyph with the verb: play triangle <-> stop square.
  $("ss-path").setAttribute("d", running
    ? "M7 7 H17 V17 H7 Z" : "M8 5.5 L18 12 L8 18.5 Z");
  $("a-startstop").classList.toggle("danger", running);
  // Server-cycle operations refuse to queue (the daemon answers 409); grey the
  // buttons out so the refusal isn't a surprise. Save/announce just talk to
  // the game API and stay available whenever it answers.
  for (const id of ["a-startstop", "a-restart", "a-backup", "a-update"])
    $(id).disabled = busy;
  $("a-save").disabled = !alive;
  $("a-announce").disabled = !alive;

  $("tiles").hidden = false;
  const m = state.metrics, p = state.process;
  $("t-players").textContent = m ? `${m.current_players}/${m.max_players}` : "–";
  $("t-fps").textContent = m ? m.server_fps : "–";
  $("t-frame").textContent = m ? `${m.server_frame_time.toFixed(1)} ms frame time` : "";
  $("t-mem").textContent = p ? `${Math.round(p.memory_mb).toLocaleString()} MB` : "–";
  $("t-memlim").textContent = state.memory_limit_mb
    ? `restart limit ${state.memory_limit_mb.toLocaleString()} MB` : "";
  // The watchdog story at a glance: how close memory is to the restart limit.
  // The label above carries the numbers; the meter is the supplementary read.
  const showMeter = p && state.memory_limit_mb > 0;
  $("t-meter").hidden = !showMeter;
  if (showMeter) {
    const frac = p.memory_mb / state.memory_limit_mb;
    const fill = $("t-meter-fill");
    fill.style.width = `${Math.min(100, frac * 100).toFixed(1)}%`;
    fill.className = frac >= 0.9 ? "crit" : frac >= 0.75 ? "warn" : "";
  }
  $("t-cpu").textContent = p ? `${Math.round(p.cpu_percent)}%` : "–";
  $("t-up").textContent = m ? fmtUp(m.uptime) : "–";
  $("t-day").textContent = m ? `day ${m.days}` : "–";
  $("t-camps").textContent = m ? `${m.base_camps} base camps` : "";

  histData = (state.history || []).filter((s) => s.memory_mb > 0);
  drawSpark(state.memory_limit_mb || 0);

  const players = state.players || [];
  $("players-sec").hidden = false;
  $("players-empty").hidden = players.length > 0;
  $("players").innerHTML = players.map((pl) =>
    `<tr><td>${esc(pl.name)}</td><td class="num">${pl.level}</td>` +
    `<td class="num">${Math.round(pl.ping)}ms</td>` +
    `<td class="num hide-sm">${pl.building_count}</td>` +
    `<td class="act">` +
    `<button class="small" data-kick="${esc(pl.user_id)}" data-name="${esc(pl.name)}">Kick</button> ` +
    `<button class="small danger" data-ban="${esc(pl.user_id)}" data-name="${esc(pl.name)}">Ban</button>` +
    `</td></tr>`).join("");

  const events = (state.events || []).slice(-20).reverse();
  $("events-sec").hidden = false;
  $("events").innerHTML = events.map((e) =>
    `<li><time>${esc((e.at || "").slice(11, 19))}</time>` +
    `<span>${esc(e.message)}</span></li>`).join("") ||
    '<li><span class="muted">Nothing yet.</span></li>';
}

function drawSpark(limitMb) {
  const svg = $("spark");
  $("chart-sec").hidden = histData.length < 2;
  if (histData.length < 2) return;

  // Draw in the element's real pixel width. A fixed viewBox stretched with
  // preserveAspectRatio=none distorts the text tags on narrow screens.
  const W = Math.max(280, Math.round(svg.clientWidth || 880)), H = 120, PAD = 14;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  const ys = histData.map((s) => s.memory_mb);
  const yMax = Math.max(limitMb * 1.05 || 0, ...ys) || 1;
  const x = (i) => (i / (histData.length - 1)) * W;
  const y = (v) => H - PAD - (v / yMax) * (H - 2 * PAD);

  const pts = ys.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`);
  let inner =
    `<path class="spark-fill" d="M0,${H} L${pts.join(" L")} L${W},${H} Z"></path>` +
    `<polyline class="spark-line" points="${pts.join(" ")}"></polyline>`;
  if (limitMb) {
    const ly = y(limitMb).toFixed(1);
    inner += `<line class="limit-line" x1="0" y1="${ly}" x2="${W}" y2="${ly}"></line>` +
      `<text class="limit-tag" x="6" y="${(+ly - 4).toFixed(1)}">limit ` +
      `${limitMb.toLocaleString()} MB</text>`;
  }
  const last = ys[ys.length - 1];
  inner += `<text class="axis-tag" x="${W - 6}" y="12" text-anchor="end">` +
    `${Math.round(last).toLocaleString()} MB now</text>`;
  // End-dot on the newest sample, ringed in the surface color so it stays
  // legible on top of the line.
  inner += `<circle cx="${W}" cy="${y(last).toFixed(1)}" r="5.5" ` +
    `fill="var(--surface)"></circle>` +
    `<circle cx="${W}" cy="${y(last).toFixed(1)}" r="3.5" ` +
    `fill="var(--series)"></circle>`;
  inner += `<line id="cursor" class="cursor" y1="0" y2="${H}"></line>`;
  svg.innerHTML = inner;

  const t = (s) => s.at
    ? new Date(s.at * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    : "";
  $("ax-start").textContent = t(histData[0]);
  $("ax-end").textContent = t(histData[histData.length - 1]);
}

// Crosshair + tooltip on the sparkline.
const box = document.querySelector(".chart-box");
box.addEventListener("mousemove", (ev) => {
  if (histData.length < 2) return;
  const svg = $("spark"), cursor = $("cursor"), tip = $("tip");
  const rect = svg.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (ev.clientX - rect.left) / rect.width));
  const i = Math.round(frac * (histData.length - 1));
  const s = histData[i];
  const xv = (i / (histData.length - 1)) * svg.viewBox.baseVal.width;
  cursor.setAttribute("x1", xv); cursor.setAttribute("x2", xv);
  cursor.style.opacity = 1;
  const when = s.at ? new Date(s.at * 1000).toLocaleTimeString() : "";
  tip.textContent = `${when}  ${Math.round(s.memory_mb).toLocaleString()} MB`;
  tip.style.left = `${frac * rect.width}px`;
  tip.style.top = "0px";
  tip.style.opacity = 1;
});
box.addEventListener("mouseleave", () => {
  const c = $("cursor"); if (c) c.style.opacity = 0;
  $("tip").style.opacity = 0;
});

tick();
setInterval(tick, 5000);
</script>
</body>
</html>
