name: Release

# Build the Windows installer when a version tag is pushed, and attach it to a
# draft GitHub Release for the maintainer to review and publish.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# This can only run on a Windows runner and isn't exercised by the normal CI.

on:
  push:
    tags:
      - "v*"        # v0.1.2
      - "[0-9]*"    # 0.1.2  (the tag that just got missed)
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and release (e.g. v0.1.2)"
        required: true
        default: "v0.1.2"

permissions:
  contents: write   # create the release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # Third-party actions are pinned by full commit SHA, not a mutable tag:
      # this workflow runs with `contents: write` and produces the shipped
      # binaries, so a retargeted tag on any of these would be a supply-chain
      # foothold on the release. The trailing comment tracks the human version.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0   # setuptools-scm reads the tag/history for the version
          # On a manual run, build the tag that was asked for — not the branch
          # HEAD it was launched from — so the binary/installer version matches
          # the release tag. On a tag push, github.ref IS the tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install palctl and PyInstaller
        # This writes palctl/_version.py from the git tag (setuptools-scm), so
        # the built binaries report the tag's version — no code to bump, nothing
        # to keep in sync, so the version can't disagree with the tag.
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Resolve version from the tag
        shell: pwsh
        run: |
          $ver = python -c "import palctl; print(palctl.__version__)"
          Write-Host "Building palctl $ver"
          echo "PALCTL_VERSION=$ver" >> $env:GITHUB_ENV

      - name: Build binaries
        working-directory: packaging
        run: python -m PyInstaller --noconfirm --clean --distpath ..\dist --workpath ..\build palctl.spec

      - name: Bundle WinSW (hash-verified) into the build
        # Ship the service wrapper inside the installer, verified against the
        # pin in palctl/winservice.py, so installer users never download it at
        # install time — fresh Windows boxes (sparse root-cert store) and AV
        # HTTPS-scanning used to kill setup there with CERTIFICATE_VERIFY_FAILED.
        # This step doubles as the pin's independent re-verification on every
        # release: a wrong pin fails the build, never a user's setup.
        shell: pwsh
        run: |
          $url = python -c "from palctl.winservice import WINSW_URL; print(WINSW_URL)"
          $sha = python -c "from palctl.winservice import WINSW_SHA256; print(WINSW_SHA256)"
          $dest = "dist\palctl\winsw.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $actual = (Get-FileHash -Algorithm SHA256 $dest).Hash.ToLower()
          if ($actual -ne $sha.ToLower()) {
            Remove-Item $dest
            throw "WinSW hash mismatch: expected $sha, got $actual - refusing to bundle."
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile the installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$env:PALCTL_VERSION packaging\installer.iss'

      - name: Package the portable build
        run: Compress-Archive -Path dist\palctl\* -DestinationPath palctl-portable.zip

      # --- Optional code signing goes here ---------------------------------
      # palctl ships unsigned, so Windows SmartScreen shows a one-time
      # "More info -> Run anyway" prompt. To remove it WITHOUT paying, sign with
      # SignPath Foundation (free for open-source projects). Add its signing
      # action after this line and before the checksum step, then the published
      # hashes will cover the signed binaries. (Azure Trusted Signing, ~$10/mo,
      # is the paid alternative — same spot.)
      # --------------------------------------------------------------------

      - name: Version-stamp the release assets
        # Publish version-stamped COPIES alongside the canonical unstamped names
        # (winget and the docs reference `palctl-setup.exe` / `palctl-portable.zip`,
        # so those stay), so a downloaded file's version is knowable from its
        # name alone rather than only from where it came from.
        shell: pwsh
        run: |
          Copy-Item "packaging\Output\palctl-setup.exe" "packaging\Output\palctl-setup-$env:PALCTL_VERSION.exe"
          Copy-Item "palctl-portable.zip" "palctl-portable-$env:PALCTL_VERSION.zip"

      - name: Generate SHA256 checksums
        # Free integrity check: users can confirm the download matches what CI
        # built, whether or not it's signed.
        shell: pwsh
        run: |
          $items = @(
            "packaging\Output\palctl-setup.exe",
            "packaging\Output\palctl-setup-$env:PALCTL_VERSION.exe",
            "palctl-portable.zip",
            "palctl-portable-$env:PALCTL_VERSION.zip"
          )
          $lines = $items | ForEach-Object {
            (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower() + "  " + (Split-Path $_ -Leaf)
          }
          # Write LF, not CRLF. Set-Content emits CRLF, which makes
          # `sha256sum -c SHA256SUMS.txt` on Linux/macOS report "no properly
          # formatted checksum lines"; and Get-FileHash returns uppercase, so
          # lower-case it to match the sha256sum on-disk format exactly.
          [IO.File]::WriteAllText("$PWD\SHA256SUMS.txt", ($lines -join "`n") + "`n")
          Get-Content SHA256SUMS.txt

      - name: Attach artifacts to a draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          draft: true
          # Use the pushed tag, or the tag typed into the manual "Run workflow".
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            packaging/Output/palctl-setup.exe
            packaging/Output/palctl-setup-${{ env.PALCTL_VERSION }}.exe
            palctl-portable.zip
            palctl-portable-${{ env.PALCTL_VERSION }}.zip
            SHA256SUMS.txt
